<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오너스경영연구소 - 리다이렉팅...</title>
    <script>
        // 쿼리 파라미터를 포함해서 client 페이지로 리다이렉트
        const currentSearch = window.location.search;
        const redirectUrl = '/client/index.html' + currentSearch;
        
        console.log('Redirecting to:', redirectUrl);
        window.location.href = redirectUrl;
    </script>
</head>
<body>
    <div style="text-align: center; padding: 50px;">
        <p>페이지로 이동 중...</p>
        <p>자동으로 이동되지 않으면 <a href="/client/">여기를 클릭</a>하세요.</p>
    </div>
</body>
</html>
